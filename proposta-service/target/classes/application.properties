# HTTP Configuration
quarkus.http.port=8081

# Reactive Postgres Database Connection
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=user
quarkus.datasource.password=password
quarkus.datasource.reactive.url=postgresql://localhost:5432/proposta_db

# Hibernate Reactive configuration
quarkus.hibernate-reactive.database.generation=update
quarkus.hibernate-reactive.log.sql=true

# Redis Cache Config
quarkus.redis.hosts=redis://localhost:6379
quarkus.cache.type=redis

# Kafka Outgoing Channel (SmallRye Messaging)
mp.messaging.outgoing.proposta-criada.connector=smallrye-kafka
mp.messaging.outgoing.proposta-criada.topic=proposta-criada
mp.messaging.outgoing.proposta-criada.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
kafka.bootstrap.servers=localhost:29092
