# ==========================================
# 1. Configurações de Servidor e API
# ==========================================
quarkus.http.port=8080
cliente-api/mp-rest/url=http://localhost:8084

# ==========================================
# 2. Configurações de Cache (Redis)
# ==========================================
quarkus.redis.hosts=redis://localhost:6379
quarkus.cache.type=redis
# TTL do cache de clientes = 10 minutos
quarkus.cache.redis."dados-cliente-cache".expire-after-write=10m

# Desativa o provisionamento automático de containers Redis pelo Quarkus
quarkus.redis.devservices.enabled=false

# ==========================================
# 3. Configurações de Mensageria (Kafka)
# ==========================================
kafka.bootstrap.servers=localhost:29092

# Kafka Incoming Channel to receive client updates and invalidate cache
mp.messaging.incoming.cliente-atualizado.connector=smallrye-kafka
mp.messaging.incoming.cliente-atualizado.topic=cliente-atualizado
mp.messaging.incoming.cliente-atualizado.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Estrategia de retry: até 3 tentativas antes de enviar para DLQ
mp.messaging.incoming.cliente-atualizado.failure-strategy=dead-letter-queue
mp.messaging.incoming.cliente-atualizado.dead-letter-queue.topic=cliente-atualizado-dlq
mp.messaging.incoming.cliente-atualizado.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Fault Tolerance - configuracoes globais
# Habilita metricas de fault tolerance para monitoramento
smallrye.faulttolerance.global.timeout.value=5000
smallrye.faulttolerance.global.circuitbreaker.delay=10000
# Desativa o provisionamento automático de containers Kafka pelo Quarkus
quarkus.kafka.devservices.enabled=false

# Canal Lógico de Saída
mp.messaging.outgoing.propostas-enviadas.connector=smallrye-kafka

# Nome Físico do Tópico no Broker (DEVE ser idêntico no Consumidor)
mp.messaging.outgoing.propostas-enviadas.topic=propostas-enviadas

# Serialização do Payload
mp.messaging.outgoing.propostas-enviadas.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
